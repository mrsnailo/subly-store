name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: subly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test" --health-interval 5s
          --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/subly_test
      AUTH_SECRET: ci_dummy_secret
      ADMIN_EMAIL: ci-admin@example.com
      ADMIN_PASSWORD: ci-admin-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run Typecheck
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test

      - name: Run Build
        run: npm run build
